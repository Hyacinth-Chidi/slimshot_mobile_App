name: slimshotai
description: "A Premium Video editor and media tools."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lucide_icons:
  animations: ^2.2.0

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Media & Compression
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  gal: ^2.3.2
  share_plus: ^10.1.4
  shared_preferences: ^2.2.2
  video_player: ^2.9.2
  media_kit: ^1.2.6
  media_kit_video: ^1.2.6
  media_kit_libs_video: ^1.0.7

  # Compression Logic
  flutter_image_compress: ^2.3.0

  # Utils
  uuid: ^4.4.0
  awesome_snackbar_content: ^0.1.8

  # Update System
  http: ^1.2.1
  url_launcher: ^6.2.5
  receive_sharing_intent: ^1.8.1
  google_mobile_ads: ^8.0.0
  pro_video_editor: ^2.2.3
  just_audio: ^0.10.5
  file_picker: ^11.0.2
  ffmpeg_kit_flutter_new: ^4.4.2
  timeago: ^3.7.1
  flutter_svg: ^2.3.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  # App Icon Configuration
  assets:
    - assets/

  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: Ariana Violeta
      fonts:
        - asset: assets/fonts/ArianaVioleta-dz2K.ttf
    - family: Believe It
      fonts:
        - asset: assets/fonts/BelieveIt-DvLE.ttf
    - family: Chrusty Rock
      fonts:
        - asset: assets/fonts/ChrustyRock-ORLA.ttf
    - family: Debrosee
      fonts:
        - asset: assets/fonts/Debrosee-ALPnL.ttf
    - family: New Retro Style 3d
      fonts:
        - asset: assets/fonts/Newretrostyle3d-ygjm.ttf
    - family: Shade Blue
      fonts:
        - asset: assets/fonts/ShadeBlue-2OozX.ttf
    - family: Short Baby
      fonts:
        - asset: assets/fonts/ShortBaby-Mg2w.ttf
    - family: Super Kindly
      fonts:
        - asset: assets/fonts/SuperKindly-drE8E.ttf

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 24 # matches our minSdk
  remove_alpha_ios: true

flutter_native_splash:
  color: "#020617"
  image: assets/logo.png
  android_12:
    icon_background_color: "#020617"
    color: "#020617"
