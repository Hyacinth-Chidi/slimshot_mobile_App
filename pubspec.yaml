name: slimshotai
description: "A Premium Video & Image Compressor."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lucide_icons:

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Media & Compression
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  gal: ^2.1.0
  share_plus: ^10.0.0
  shared_preferences: ^2.2.2
  video_player: ^2.9.2

  # Compression Logic
  ffmpeg_kit_flutter_new_min_gpl: ^2.1.1
  flutter_image_compress: ^2.3.0

  # Utils
  uuid: ^4.4.0

  # Update System
  http: ^1.2.1
  url_launcher: ^6.2.5
  receive_sharing_intent: ^1.8.1
  google_mobile_ads: ^8.0.0

flutter:
  uses-material-design: true

  # App Icon Configuration
  assets:
    - assets/

  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 24 # matches our minSdk
  remove_alpha_ios: true
